name: CI — Lint, Type Check & Build

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint → Type Check → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint check (next lint)
        run: npx next lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          CI: true
